<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Invitación de Valeria!</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@700&family=Dancing+Script:wght@600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background-color: #fdf5e6;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #5a5a5a;
            overflow-x: hidden;
        }

        /* --- ANIMACIONES --- */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        /* ------------------- */

        .container {
            background-color: #ffffff;
            max-width: 550px; 
            width: 100%;
            padding: 25px 20px; /* Reducido para ahorrar espacio vertical */
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            border: 8px solid #fefaf0;
            
            animation: fadeSlideUp 1s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            opacity: 0; 
        }
        
        .header-text {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8em;
            color: #888;
            margin-bottom: 0px;
        }
        
        .main-title {
            font-family: 'Arvo', serif;
            font-size: 3.5em; /* Ligeramente más pequeño para encajar mejor */
            font-weight: 700;
            margin: 5px 0;
            letter-spacing: 5px;
        }
        
        .c-orange { color: #E87A40; }
        .c-yellow { color: #F3CB5A; }
        .c-teal { color: #92D1C8; }

        .character-img {
            width: 140px; /* Imagen un poco más compacta */
            margin: 5px 0;
            max-width: 100%;
        }

        .event-details {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 15px 0; /* Espaciado reducido */
            gap: 15px;
        }
        .detail-col {
            text-align: center;
            font-size: 1em;
            line-height: 1.4;
        }
        .middle-col {
            padding: 0 10px;
        }
        .text-orange {
            color: #E87A40;
            font-weight: 600;
        }
        .text-yellow {
            color: #F3CB5A;
            font-weight: 600;
        }
        .divider {
            width: 2px;
            height: 50px;
            background-color: #7A7A7A;
        }

        .map-wrapper {
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin: 15px 0; /* Espaciado reducido */
            border: 5px solid white;
            transition: transform 0.3s;
        }
        
        .map-wrapper:hover {
            transform: scale(1.02);
        }

        iframe {
            width: 100%;
            height: 160px; /* Alto del mapa reducido para evitar el scroll */
            border: 0;
            display: block;
        }
        .btn-whatsapp {
            display: inline-block;
            background-color: #7fb069;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 5px;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            max-width: 300px;
        }
        .btn-whatsapp:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(127, 176, 105, 0.4); 
        }

        /* --- AJUSTES PARA PANTALLAS DE CELULAR --- */
        @media (max-width: 550px) {
            .container {
                padding: 25px 15px;
            }
            .main-title {
                font-size: 2.8em;
                letter-spacing: 2px;
            }
            .event-details {
                gap: 5px;
            }
            .detail-col {
                font-size: 0.85em;
            }
            .middle-col {
                padding: 0 5px;
            }
            .divider {
                height: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-text">Valeria está cumpliendo</div>
        
        <h1 class="main-title">
            <span class="c-orange">N</span><span class="c-yellow">U</span><span class="c-teal">E</span><span class="c-orange">V</span><span class="c-yellow">E</span>
        </h1>

        <img src="assets/mickey2.png" alt="Mickey" class="character-img">

        <p style="font-family: 'Dancing Script', cursive; font-size: 1.5em; color: #888; margin: 5px 0;">¡Ven a celebrar con nosotros!</p>

        <div class="event-details">
            <div class="detail-col">
                <div class="text-orange">Cuándo</div>
                <div class="text-yellow">Sábado 28 Feb.</div>
            </div>
            
            <div class="divider"></div>
            
            <div class="detail-col middle-col">
                <div class="text-orange">¿Dónde?</div>
                <div class="text-yellow">Salón de eventos</div>
                <div class="text-yellow">La Fiestita</div>
            </div>
            
            <div class="divider"></div>
            
            <div class="detail-col">
                <div class="text-orange">Empieza a las</div>
                <div class="text-yellow">7:00 PM</div>
            </div>
        </div>

        <div class="map-wrapper">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3762.485!2d-99.16!3d19.43!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTnCsDI1JzQ4LjAiTiA5OcKwMDknMzYuMCJX!5e0!3m2!1ses!2smx!4v123456789" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>

        <a href="https://wa.me/525537882030?text=¡Confirmo+asistencia!" class="btn-whatsapp">
            Confirmar por WhatsApp
        </a>
    </div>

</body>
</html>
